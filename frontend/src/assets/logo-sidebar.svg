<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Eye shape -->
  <path d="M 30,256 Q 143,95 256,95 Q 369,95 482,256 Q 369,417 256,417 Q 143,417 30,256 Z"
        fill="none" stroke="#00d4ff" stroke-width="10" opacity="1"/>

  <!-- Inner eye glow -->
  <path d="M 60,256 Q 155,130 256,130 Q 357,130 452,256 Q 357,382 256,382 Q 155,382 60,256 Z"
        fill="#00d4ff" opacity="0.12"/>

  <!-- Iris outer -->
  <circle cx="256" cy="256" r="88" fill="none" stroke="#00d4ff" stroke-width="6" opacity="1"/>

  <!-- Iris inner ring -->
  <circle cx="256" cy="256" r="68" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.6"/>

  <!-- Pupil - bright filled -->
  <circle cx="256" cy="256" r="38" fill="#00d4ff" opacity="1"/>

  <!-- Pupil core (darker center for depth) -->
  <circle cx="256" cy="256" r="18" fill="#0a0e14" opacity="0.7"/>

  <!-- Light reflections -->
  <ellipse cx="240" cy="238" rx="9" ry="7" fill="white" opacity="0.7" transform="rotate(-20,240,238)"/>
  <circle cx="272" cy="268" r="4" fill="white" opacity="0.4"/>

  <!-- Corner brackets -->
  <g stroke="#00d4ff" stroke-width="5" fill="none" opacity="0.8">
    <path d="M 78,155 L 78,128 L 105,128"/>
    <path d="M 434,155 L 434,128 L 407,128"/>
    <path d="M 78,357 L 78,384 L 105,384"/>
    <path d="M 434,357 L 434,384 L 407,384"/>
  </g>
</svg>
